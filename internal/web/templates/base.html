{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg:         #f8fafc;
      --surface:    #ffffff;
      --border:     #e5e7eb;
      --text:       #0f172a;
      --muted:      #64748b;
      --accent:     #2563eb;
      --accent-2:   #7c3aed;                          /* violet for gradient pairing */
      --accent-fg:  #ffffff;
      --accent-tint: #eff6ff;
      --accent-glow: rgba(37, 99, 235, 0.18);
      --gradient-primary: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      --bg-vignette:
        radial-gradient(ellipse 900px 600px at 15% -10%, rgba(37, 99, 235, 0.10), transparent 65%),
        radial-gradient(ellipse 1000px 700px at 95% 110%, rgba(124, 58, 237, 0.08), transparent 65%);
      --warn-bg:    #fffbeb;
      --warn-fg:    #92400e;
      --warn-bd:    #fcd34d;
      --ok:         #15803d;
      --ok-tint:    #dcfce7;
      --hover-fill: #f1f5f9;
      --code-bg:    #f1f5f9;
      --radius:     10px;
      --shadow:     0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #0a0a0b;                          /* near-black "ink", not slate */
        --surface:    #141416;                          /* subtle elevation over bg */
        --border:     rgba(255, 255, 255, 0.06);        /* hairline, only just visible */
        --text:       #ededee;                          /* warm off-white */
        --muted:      rgba(255, 255, 255, 0.5);
        --accent:     #3b82f6;
        --accent-2:   #818cf8;                          /* indigo-400 */
        --accent-fg:  #ffffff;
        --accent-tint: rgba(59, 130, 246, 0.14);
        --accent-glow: rgba(59, 130, 246, 0.32);
        --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #818cf8 100%);
        --bg-vignette:
          radial-gradient(ellipse 900px 600px at 15% -10%, rgba(59, 130, 246, 0.22), transparent 65%),
          radial-gradient(ellipse 1000px 700px at 95% 110%, rgba(129, 140, 248, 0.18), transparent 65%),
          radial-gradient(ellipse 500px 400px at 50% 50%, rgba(99, 102, 241, 0.05), transparent 70%);
        --warn-bg:    rgba(252, 211, 77, 0.08);
        --warn-fg:    #fcd34d;
        --warn-bd:    rgba(252, 211, 77, 0.28);
        --ok:         #4ade80;
        --ok-tint:    rgba(74, 222, 128, 0.14);
        --hover-fill: rgba(255, 255, 255, 0.04);
        --code-bg:    rgba(255, 255, 255, 0.06);
        --shadow:     none;                             /* lean on borders, not shadows */
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--text);
      font-size: 15px; line-height: 1.5;
    }
    /* Paint the background on the root element so it propagates to the whole
       canvas — including the area above .container's collapsed top margin and
       any overscroll. Painting it on body instead leaves a flat strip up top
       where body's background stops and the root's bare colour shows through. */
    html {
      background:
        var(--bg-vignette, none),
        var(--bg);
      background-attachment: fixed;
      min-height: 100vh;
    }
    body { min-height: 100vh; }
    .container { max-width: 640px; margin: 2.5rem auto; padding: 0 1.25rem; }
    h1 { font-size: 1.625rem; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 0.5rem; }
    h2 { font-size: 1.125rem; font-weight: 600; margin: 1.75rem 0 0.5rem; }
    p { margin: 0.25rem 0 1rem; color: var(--muted); }
    p strong, li strong { color: var(--text); font-weight: 600; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.25rem;
      margin-bottom: 1rem; box-shadow: var(--shadow);
    }
    .card-tight { padding: 0.5rem 0.75rem; }

    label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text); margin: 0.75rem 0 0.25rem; }
    label:first-child { margin-top: 0; }
    input[type=text], input[type=email], input[type=number], input[type=url], textarea, select {
      width: 100%; padding: 0.55rem 0.7rem; font-size: 0.95rem;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--text);
      font-family: inherit;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-tint);
    }
    textarea { resize: vertical; min-height: 4rem; }

    button, .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1rem; font-size: 0.95rem; font-weight: 500;
      font-family: inherit;
      border: 1px solid transparent; border-radius: 8px;
      cursor: pointer; background: var(--surface); color: var(--text);
      transition: background 0.12s, border-color 0.12s;
    }
    button:hover { background: var(--hover-fill); }
    button.primary {
      background: var(--gradient-primary); color: var(--accent-fg);
      border-color: transparent;
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    button.primary:hover { filter: brightness(0.94); }
    button.ghost {
      background: transparent; color: var(--muted);
      border: 1px dashed var(--border);
    }
    button.ghost:hover { color: var(--text); border-color: var(--muted); background: var(--surface); }

    .row { display: flex; gap: 0.75rem; align-items: flex-end; }
    .row > * { flex: 1; }

    .warn {
      background: var(--warn-bg); color: var(--warn-fg);
      border: 1px solid var(--warn-bd);
      border-radius: 8px; padding: 0.6rem 0.8rem; margin: 0 0 0.75rem;
      font-size: 0.9rem;
    }

    /* Day cards (slot picker) */
    .day {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 0.75rem;
      overflow: hidden; box-shadow: var(--shadow);
    }
    .day > summary {
      list-style: none; cursor: pointer;
      padding: 0.85rem 1.1rem; display: flex; align-items: baseline; justify-content: space-between;
      font-weight: 600;
      transition: background 0.1s;
    }
    .day > summary:hover { background: var(--hover-fill); }
    .day > summary::-webkit-details-marker { display: none; }
    .day > summary::after {
      content: '▾'; color: var(--muted); font-size: 0.8rem; transition: transform 0.15s;
    }
    .day[open] > summary::after { transform: rotate(180deg); display: inline-block; }
    .day[open] > summary { border-bottom: 1px solid var(--border); }
    .day .count { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 0.4rem; }
    .slots-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(7rem, 1fr));
      grid-auto-rows: 3.6rem;     /* every row uniform — chips stretch into them */
      gap: 0.5rem; padding: 0.9rem 1.1rem;
    }
    .chip {
      position: relative; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      align-self: stretch;        /* fill the grid cell */
      margin: 0;                  /* override generic label margins */
      padding: 0.4rem 0.5rem;
      text-align: center;
      border: 1px solid var(--border); border-radius: 8px;
      font-weight: 500; font-size: 0.95rem; line-height: 1.2;
      background: var(--surface);
      transition: background 0.1s, border-color 0.1s;
    }
    .chip:hover { border-color: var(--accent); background: var(--accent-tint); }
    .chip, .chip * { cursor: pointer; }
    .chip input { position: absolute; opacity: 0; inset: 0; }
    .chip:has(input:checked) {
      background: var(--gradient-primary); color: var(--accent-fg); border-color: transparent;
      opacity: 1;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .chip .when { display: block; font-weight: 600; }
    .chip .meta {
      display: block; font-size: 0.65rem; font-weight: 400;
      color: var(--muted);
      margin-top: 0.2rem; letter-spacing: 0.02em;
    }
    .chip:has(input:checked) .meta { color: rgba(255,255,255,0.7); }
    /* Less-ideal slots: faded, dashed, light background — clearly de-emphasized
       but still clickable. Full prominence returns on hover and when selected. */
    .chip:has(.meta):not(:has(input:checked)) {
      opacity: 0.55;
      background: var(--bg);
      border-style: dashed;
    }
    .chip:has(.meta):not(:has(input:checked)):hover {
      opacity: 1; border-style: solid;
    }

    .participant {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.85rem 1rem; margin: 0.5rem 0;
    }

    .actions { margin-top: 1.25rem; }
    .actions button + button { margin-left: 0.5rem; }

    /* Briefly highlight the freshly-loaded slot section. Runs once on insert
       (htmx swaps fresh DOM, so the animation replays each search). Quick fade
       in to an accent tint, slow gentle fade out. */
    .just-loaded {
      border-radius: var(--radius);
      border: 1px solid transparent;   /* reserves space; visible only during flash */
      padding: 1rem 1.25rem;
      animation: flash-highlight 2s ease-out 1;
    }
    @keyframes flash-highlight {
      0%   { background: transparent;        border-color: transparent;  box-shadow: 0 0 0 0 transparent; }
      8%   { background: var(--accent-tint); border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-tint); }
      100% { background: transparent;        border-color: transparent;  box-shadow: 0 0 0 0 transparent; }
    }
    @media (prefers-reduced-motion: reduce) {
      .just-loaded { animation: none; }
    }

    .hero {
      text-align: center; padding: 1.5rem 0;
    }
    .hero .check {
      display: inline-flex; align-items: center; justify-content: center;
      width: 3.25rem; height: 3.25rem; border-radius: 999px;
      background: var(--ok-tint); color: var(--ok); font-size: 1.5rem; font-weight: 700;
      margin-bottom: 0.75rem;
      box-shadow: 0 0 0 6px var(--ok-tint);
    }

    dl.summary { margin: 0; }
    dl.summary div { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    dl.summary div:last-child { border-bottom: none; }
    dl.summary dt { color: var(--muted); font-size: 0.85rem; }
    dl.summary dd { margin: 0; font-weight: 500; text-align: right; max-width: 60%; }

    code { background: var(--code-bg); padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.85em; }
    a { color: var(--accent); }
  </style>
</head>
<body>
<div class="container">
{{template "content" .}}
</div>
</body>
</html>
{{end}}
